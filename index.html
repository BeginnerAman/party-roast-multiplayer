<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trust, Secrets & Betrayal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body class="bg-gradient-to-br from-pink-900 via-purple-900 to-indigo-900 text-white font-[Poppins] min-h-screen overflow-hidden flex items-center justify-center selection:bg-pink-500">
    
    <div id="particles" class="absolute inset-0 pointer-events-none overflow-hidden"></div>

    <div class="glass-panel w-full max-w-md mx-4 p-8 rounded-3xl shadow-2xl relative z-10 text-center transition-all duration-500">
        
        <div id="home-screen" class="screen-active">
            <h1 class="text-4xl font-bold mb-2 bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-purple-300 drop-shadow-lg">Trust, Secrets<br>& Betrayal</h1>
            <p class="text-pink-200 text-sm mb-8 opacity-80 italic">A game dedicated to Sarika 💖</p>
            
            <div class="space-y-4">
                <button onclick="createRoom()" class="btn-primary w-full py-3 rounded-xl font-semibold text-lg shadow-[0_0_15px_rgba(236,72,153,0.5)] transition-all hover:scale-105">
                    ✨ Create Room
                </button>
                
                <div class="relative flex items-center py-2">
                    <div class="flex-grow border-t border-white/20"></div>
                    <span class="flex-shrink-0 mx-4 text-white/50 text-sm">or</span>
                    <div class="flex-grow border-t border-white/20"></div>
                </div>

                <div class="flex space-x-2">
                    <input type="text" id="join-code" placeholder="Enter Room Code" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-pink-400 text-center uppercase tracking-widest font-semibold">
                    <button onclick="joinRoom()" class="bg-purple-600 hover:bg-purple-500 px-6 rounded-xl font-semibold transition-all shadow-lg">Join</button>
                </div>
            </div>
        </div>

        <div id="lobby-screen" class="hidden">
            <h2 class="text-2xl font-bold mb-1">Game Lobby</h2>
            <p class="text-sm text-pink-200 mb-6">Room Code: <span id="display-room-code" class="font-mono bg-white/20 px-2 py-1 rounded text-white tracking-widest font-bold">----</span></p>
            
            <div id="player-list" class="space-y-3 mb-8 text-left">
                </div>

            <p id="waiting-msg" class="text-sm text-white/70 animate-pulse mb-4">Waiting for players to join... (Max 3)</p>
            
            <button id="start-btn" onclick="startGame()" class="hidden btn-primary w-full py-3 rounded-xl font-semibold text-lg transition-all hover:scale-105">
                🚀 Start Game
            </button>
        </div>

        <div id="game-screen" class="hidden">
            <h2 class="text-2xl font-bold mb-2">Make Your Choice</h2>
            <p id="dynamic-msg" class="text-pink-300 text-sm h-6 mb-6 italic">Sarika is watching your choice 👀</p>
            
            <div class="grid grid-cols-1 gap-4 mb-6">
                <button onclick="makeChoice('Trust')" class="choice-btn group relative overflow-hidden bg-white/10 border border-green-400/30 hover:bg-green-500/20 py-4 rounded-2xl transition-all hover:scale-105 hover:border-green-400">
                    <span class="text-3xl block mb-1 group-hover:animate-bounce">🤝</span>
                    <span class="font-semibold tracking-wide">Trust</span>
                </button>
                <button onclick="makeChoice('Secret')" class="choice-btn group relative overflow-hidden bg-white/10 border border-purple-400/30 hover:bg-purple-500/20 py-4 rounded-2xl transition-all hover:scale-105 hover:border-purple-400">
                    <span class="text-3xl block mb-1 group-hover:animate-bounce">🤫</span>
                    <span class="font-semibold tracking-wide">Secret</span>
                </button>
                <button onclick="makeChoice('Betray')" class="choice-btn group relative overflow-hidden bg-white/10 border border-red-400/30 hover:bg-red-500/20 py-4 rounded-2xl transition-all hover:scale-105 hover:border-red-400">
                    <span class="text-3xl block mb-1 group-hover:animate-bounce">😈</span>
                    <span class="font-semibold tracking-wide">Betray</span>
                </button>
            </div>
            <p id="choice-status" class="text-sm text-white/60">Waiting for others...</p>
        </div>

        <div id="result-screen" class="hidden">
            <div id="suspense-container" class="py-12">
                <div class="text-6xl animate-spin-slow mb-4 inline-block">✨</div>
                <h2 class="text-2xl font-bold animate-pulse">Revealing choices...</h2>
            </div>

            <div id="final-results" class="hidden">
                <h2 class="text-3xl font-bold mb-2 drop-shadow-md" id="result-headline">Result</h2>
                <p id="result-subtext" class="text-pink-300 italic mb-6">...</p>
                
                <div id="result-players" class="space-y-3 mb-8 text-left">
                    </div>

                <button onclick="resetGame()" class="btn-primary w-full py-3 rounded-xl font-semibold shadow-lg transition-all hover:scale-105">
                    🔄 Play Again
                </button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
